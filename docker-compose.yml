version: "3.9"
services:
  api:
    build: ./apps/server
    container_name: mdm-api
    env_file: [ ./apps/server/.env.production ]
    ports: [ "4000:4000" ]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build: ./apps/web
    container_name: mdm-web
    env_file: [ ./apps/web/.env.production ]
    ports: [ "3000:3000" ]
    restart: unless-stopped
    depends_on: [ api ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 5
